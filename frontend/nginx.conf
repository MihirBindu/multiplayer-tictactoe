server {
    listen      80;
    server_name _;

    # ── Static React app (SPA fallback) ──────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Nakama HTTP API (REST + RPC) ──────────────────────────────────────────
    # The browser sees:  http://<host>/v2/...
    # Nginx forwards to: http://nakama:7350/v2/...  (internal Docker network)
    location /v2/ {
        proxy_pass              http://nakama:7350/v2/;
        proxy_http_version      1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
    }

    # ── Nakama WebSocket (real-time match traffic) ────────────────────────────
    # The browser sees:  ws://<host>/ws?token=...
    # Nginx upgrades and forwards to: ws://nakama:7350/ws?token=...
    location /ws {
        proxy_pass              http://nakama:7350/ws;
        proxy_http_version      1.1;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         "upgrade";
        proxy_set_header Host               $host;
        proxy_cache_bypass                  $http_upgrade;
        proxy_read_timeout                  86400s;   # hold open for long matches
        proxy_send_timeout                  86400s;
    }
}
